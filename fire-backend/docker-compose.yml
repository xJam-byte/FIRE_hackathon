version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fire_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - '5433:5432'
    volumes:
      - fire_pgdata:/var/lib/postgresql/data

volumes:
  fire_pgdata:
